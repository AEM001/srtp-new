version: "3.9"

# GPU-accelerated variant – requires NVIDIA Container Toolkit
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up

services:
  fip-stream:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      # EGL hardware-accelerated rendering (needs GPU + NVIDIA EGL drivers)
      - PYOPENGL_PLATFORM=egl
